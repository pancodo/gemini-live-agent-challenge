<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#F2EDE3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="AI Historian" />
    <meta property="og:description" content="A real-time multimodal research and documentary engine. Upload any historical document and watch AI generate a cinematic documentary." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Historian" />
    <meta name="twitter:description" content="A real-time multimodal research and documentary engine." />
    <meta name="twitter:image" content="/og-image.png" />
    <title>AI Historian</title>
    <!-- Blocking theme init — must run before CSS to prevent FOUC -->
    <script>
      (function() {
        try {
          var s = localStorage.getItem('ai-historian-settings');
          var obj = s ? JSON.parse(s) : null;
          var theme = obj && obj.theme;
          var resolved = (theme === 'dark' || theme === 'light')
            ? theme
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', resolved);
        } catch(e) {}
      })();
    </script>
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <!-- Self-hosted variable fonts (preload for zero CLS) -->
    <link rel="preload" href="/fonts/CormorantGaramond-Variable.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/CormorantGaramond-Variable-Italic.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/DMSans-Variable.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Film grain SVG filter (inline — referenced by .grain-overlay) -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden">
      <filter id="grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
      </filter>
    </svg>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
